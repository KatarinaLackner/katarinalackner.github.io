<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Angi — Interactive Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .device-frame {
      width: 375px;
      height: 812px;
      max-height: 90vh;
      background: #000;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      position: relative;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background: #fff;
    }
    .screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .screen[data-step="1"] .hotspot-next { position: absolute; bottom: 24px; right: 20px; width: 100px; height: 48px; cursor: pointer; }
    .screen[data-step="1"] .hotspot-back { position: absolute; bottom: 24px; left: 20px; width: 80px; height: 48px; cursor: pointer; }
    .screen[data-step="2"] .hotspot-next { position: absolute; bottom: 24px; right: 20px; width: 100px; height: 48px; cursor: pointer; }
    .screen[data-step="2"] .hotspot-back { position: absolute; bottom: 24px; left: 20px; width: 80px; height: 48px; cursor: pointer; }
    .screen[data-step="3"] .hotspot-click-here { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; cursor: pointer; }
    .screen[data-step="4"] .hotspot-view-pros { position: absolute; bottom: 140px; left: 24px; right: 24px; height: 52px; cursor: pointer; }
    .screen[data-step="5"] .hotspot-request-quotes { position: absolute; bottom: 100px; left: 24px; right: 24px; height: 52px; cursor: pointer; }
    .hotspot-close {
      position: absolute;
      top: 56px;
      right: 20px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      z-index: 2;
    }
    .screen .hotspot {
      z-index: 1;
      transition: background 0.15s;
    }
    .screen .hotspot:hover { background: rgba(255,0,0,0.08); }
    .screen .hotspot:active { background: rgba(255,0,0,0.12); }
    [data-step].hidden { display: none !important; }
    .step-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 20px;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.2s, transform 0.2s;
    }
    .step-dot.active { background: #fff; transform: scale(1.2); }
    .step-dot.done { background: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="device-frame">
    <div class="screen" data-step="1" id="screen1">
      <img src="assets/screen1.png" alt="What kind of cleaning do you need?">
      <div class="hotspot hotspot-close" data-action="close" title="Close"></div>
      <div class="hotspot hotspot-back" data-action="prev" title="Back"></div>
      <div class="hotspot hotspot-next" data-action="next" title="Next"></div>
    </div>
    <div class="screen hidden" data-step="2" id="screen2">
      <img src="assets/screen2.png" alt="What kind of location is this?">
      <div class="hotspot hotspot-close" data-action="close" title="Close"></div>
      <div class="hotspot hotspot-back" data-action="prev" title="Back"></div>
      <div class="hotspot hotspot-next" data-action="next" title="Next"></div>
    </div>
    <div class="screen hidden" data-step="3" id="screen3">
      <img src="assets/screen3.png" alt="Building your project">
      <div class="hotspot hotspot-close" data-action="close" title="Close"></div>
      <div class="hotspot hotspot-click-here" data-action="next" title="Click Here"></div>
    </div>
    <div class="screen hidden" data-step="4" id="screen4">
      <img src="assets/screen4.png" alt="We have matching pros in your area!">
      <div class="hotspot hotspot-close" data-action="close" title="Close"></div>
      <div class="hotspot hotspot-view-pros" data-action="next" title="View Matching Pros"></div>
    </div>
    <div class="screen hidden" data-step="5" id="screen5">
      <img src="assets/screen5.png" alt="One more step...">
      <div class="hotspot hotspot-close" data-action="close" title="Close"></div>
      <div class="hotspot hotspot-request-quotes" data-action="next" title="Request quotes"></div>
    </div>
  </div>
  <div class="step-indicator" aria-hidden="true">
    <span class="step-dot active" data-dot="1"></span>
    <span class="step-dot" data-dot="2"></span>
    <span class="step-dot" data-dot="3"></span>
    <span class="step-dot" data-dot="4"></span>
    <span class="step-dot" data-dot="5"></span>
  </div>
  <script>
    (function () {
      var current = 1;
      var total = 5;
      var screens = document.querySelectorAll('.screen[data-step]');
      var dots = document.querySelectorAll('.step-dot[data-dot]');
      var buildingTimer = null;

      function go(step) {
        step = Math.max(1, Math.min(total, step));
        current = step;
        screens.forEach(function (el) {
          var s = parseInt(el.getAttribute('data-step'), 10);
          el.classList.toggle('hidden', s !== step);
        });
        dots.forEach(function (el) {
          var d = parseInt(el.getAttribute('data-dot'), 10);
          el.classList.remove('active', 'done');
          if (d < step) el.classList.add('done');
          if (d === step) el.classList.add('active');
        });
        if (step === 3) startBuildingRedirect();
        else clearBuildingRedirect();
      }
      function next() { go(current + 1); }
      function prev() { go(current - 1); }
      function closeFlow() { go(1); }
      function startBuildingRedirect() {
        clearBuildingRedirect();
        buildingTimer = setTimeout(function () { next(); }, 3000);
      }
      function clearBuildingRedirect() {
        if (buildingTimer) { clearTimeout(buildingTimer); buildingTimer = null; }
      }
      document.querySelectorAll('.hotspot[data-action="next"]').forEach(function (el) {
        el.addEventListener('click', next);
      });
      document.querySelectorAll('.hotspot[data-action="prev"]').forEach(function (el) {
        el.addEventListener('click', prev);
      });
      document.querySelectorAll('.hotspot[data-action="close"]').forEach(function (el) {
        el.addEventListener('click', closeFlow);
      });
      dots.forEach(function (dot) {
        dot.addEventListener('click', function () {
          go(parseInt(this.getAttribute('data-dot'), 10));
        });
      });
      go(1);
    })();
  </script>
</body>
</html>
